AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Tribunet - Israeli Football Match Platform (Serverless)

# ── Parameters ────────────────────────────────────────────────────────────────
Parameters:
  CognitoUserPoolId:
    Type: String
    Description: Cognito User Pool ID (from AWS Console)
  CognitoClientId:
    Type: String
    Description: Cognito App Client ID (from AWS Console)
  Stage:
    Type: String
    Default: prod
    AllowedValues: [dev, prod]
  AlertEmail:
    Type: String
    Default: tribunet15@gmail.com
    Description: Primary email address to receive CloudWatch alarm notifications
  AlertEmailSecondary:
    Type: String
    Default: roymeoded2512@gmail.com
    Description: Secondary email address to receive CloudWatch alarm notifications

# ── Globals ───────────────────────────────────────────────────────────────────
Globals:
  Function:
    Runtime: python3.13
    Timeout: 15
    MemorySize: 256
    Tracing: Active
    CodeUri: ../backend/
    Environment:
      Variables:
        COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
        COGNITO_CLIENT_ID:    !Ref CognitoClientId
        DYNAMODB_USERS_TABLE:     !Ref UsersTable
        DYNAMODB_MATCHES_TABLE:   !Ref MatchesTable
        DYNAMODB_STADIUMS_TABLE:  !Ref StadiumsTable
        DYNAMODB_FAVORITES_TABLE: !Ref FavoritesTable
        DYNAMODB_TEAMS_TABLE:     !Ref TeamsTable
        DYNAMODB_LEAGUES_TABLE:   !Ref LeaguesTable
        FRONTEND_URL: '*'

Resources:

  # ── API Gateway HTTP API ─────────────────────────────────────────────────────
  TribunetApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Stage
      DefaultRouteSettings:
        ThrottlingBurstLimit: 100
        ThrottlingRateLimit: 50
      Auth:
        DefaultAuthorizer: CognitoAuth
        Authorizers:
          CognitoAuth:
            JwtConfiguration:
              issuer: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPoolId}'
              audience:
                - !Ref CognitoClientId
            IdentitySource: '$request.header.Authorization'
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS

  # ── DynamoDB Tables ───────────────────────────────────────────────────────────

  MatchesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'tribunet-matches-${Stage}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: matchId
          AttributeType: S
        - AttributeName: stadiumId
          AttributeType: S
      KeySchema:
        - AttributeName: matchId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: stadiumId-index
          KeySchema:
            - AttributeName: stadiumId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  StadiumsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'tribunet-stadiums-${Stage}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: stadiumId
          AttributeType: S
      KeySchema:
        - AttributeName: stadiumId
          KeyType: HASH

  FavoritesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'tribunet-favorites-${Stage}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: matchId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: matchId
          KeyType: RANGE

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'tribunet-users-${Stage}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  TeamsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'tribunet-teams-${Stage}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: teamId
          AttributeType: S
      KeySchema:
        - AttributeName: teamId
          KeyType: HASH

  LeaguesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'tribunet-leagues-${Stage}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: leagueId
          AttributeType: S
      KeySchema:
        - AttributeName: leagueId
          KeyType: HASH

  # ── IAM Role shared by all Lambda functions ───────────────────────────────────
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBFullAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:DeleteItem
                  - dynamodb:Scan
                  - dynamodb:Query
                  - dynamodb:UpdateItem
                Resource:
                  - !GetAtt MatchesTable.Arn
                  - !Sub '${MatchesTable.Arn}/index/*'
                  - !GetAtt StadiumsTable.Arn
                  - !GetAtt FavoritesTable.Arn
                  - !Sub '${FavoritesTable.Arn}/index/*'
                  - !GetAtt UsersTable.Arn
                  - !GetAtt TeamsTable.Arn
                  - !GetAtt LeaguesTable.Arn
        - PolicyName: CognitoAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:AdminDeleteUser
                  - cognito-idp:AdminGetUser
                  - cognito-idp:ListUsers
                  - cognito-idp:UpdateUserPool
                Resource: !Sub 'arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${CognitoUserPoolId}'
        - PolicyName: SNSPublish
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sns:Publish
                Resource: !Sub 'arn:aws:sns:${AWS::Region}:${AWS::AccountId}:tribunet-alerts-${Stage}'
        - PolicyName: XRayAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - xray:PutTraceSegments
                  - xray:PutTelemetryRecords
                Resource: '*'

  # ── Lambda: Matches ───────────────────────────────────────────────────────────
  MatchesFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions.matches.handler.main
      Role: !GetAtt LambdaRole.Arn
      Events:
        GetMatches:
          Type: HttpApi
          Properties:
            ApiId: !Ref TribunetApi
            Path: /matches
            Method: GET
            Auth:
              Authorizer: NONE
        GetMatch:
          Type: HttpApi
          Properties:
            ApiId: !Ref TribunetApi
            Path: /matches/{id}
            Method: GET
            Auth:
              Authorizer: NONE
        CreateMatch:
          Type: HttpApi
          Properties:
            ApiId: !Ref TribunetApi
            Path: /matches
            Method: POST
        UpdateMatch:
          Type: HttpApi
          Properties:
            ApiId: !Ref TribunetApi
            Path: /matches/{id}
            Method: PUT
        DeleteMatch:
          Type: HttpApi
          Properties:
            ApiId: !Ref TribunetApi
            Path: /matches/{id}
            Method: DELETE

  # ── Lambda: Stadiums ──────────────────────────────────────────────────────────
  StadiumsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions.stadiums.handler.main
      Role: !GetAtt LambdaRole.Arn
      Events:
        GetStadiums:
          Type: HttpApi
          Properties:
            ApiId: !Ref TribunetApi
            Path: /stadiums
            Method: GET
            Auth:
              Authorizer: NONE
        GetStadium:
          Type: HttpApi
          Properties:
            ApiId: !Ref TribunetApi
            Path: /stadiums/{id}
            Method: GET
            Auth:
              Authorizer: NONE
        CreateStadium:
          Type: HttpApi
          Properties:
            ApiId: !Ref TribunetApi
            Path: /stadiums
            Method: POST
        UpdateStadium:
          Type: HttpApi
          Properties:
            ApiId: !Ref TribunetApi
            Path: /stadiums/{id}
            Method: PUT
        DeleteStadium:
          Type: HttpApi
          Properties:
            ApiId: !Ref TribunetApi
            Path: /stadiums/{id}
            Method: DELETE

  # ── Lambda: Favorites ─────────────────────────────────────────────────────────
  FavoritesFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions.favorites.handler.main
      Role: !GetAtt LambdaRole.Arn
      Events:
        GetFavorites:
          Type: HttpApi
          Properties:
            ApiId: !Ref TribunetApi
            Path: /favorites
            Method: GET
        AddFavorite:
          Type: HttpApi
          Properties:
            ApiId: !Ref TribunetApi
            Path: /favorites/{id}
            Method: POST
        RemoveFavorite:
          Type: HttpApi
          Properties:
            ApiId: !Ref TribunetApi
            Path: /favorites/{id}
            Method: DELETE

  # ── Lambda: Cognito Post-Confirmation Trigger ─────────────────────────────────
  CognitoTriggerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions.cognito_trigger.handler.main
      Role: !GetAtt LambdaRole.Arn

  # Allows Cognito to invoke the trigger Lambda
  CognitoTriggerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt CognitoTriggerFunction.Arn
      Principal: cognito-idp.amazonaws.com
      SourceArn: !Sub 'arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${CognitoUserPoolId}'

  # ── Lambda: Cognito Setup (Custom Resource) ────────────────────────────────────
  # Runs on every sam deploy — attaches PostConfirmation trigger + AutoVerifiedAttributes
  CognitoSetupFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions.cognito_setup.handler.main
      Role: !GetAtt LambdaRole.Arn
      Timeout: 30

  CognitoTriggerSetup:
    Type: Custom::CognitoTriggerSetup
    DependsOn: CognitoTriggerFunction
    Properties:
      ServiceToken: !GetAtt CognitoSetupFunction.Arn
      UserPoolId:   !Ref CognitoUserPoolId
      LambdaArn:    !GetAtt CognitoTriggerFunction.Arn

  # ── Lambda: Users ─────────────────────────────────────────────────────────────
  UsersFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions.users.handler.main
      Role: !GetAtt LambdaRole.Arn
      Events:
        GetMe:
          Type: HttpApi
          Properties:
            ApiId: !Ref TribunetApi
            Path: /users/me
            Method: GET
        GetUsers:
          Type: HttpApi
          Properties:
            ApiId: !Ref TribunetApi
            Path: /users
            Method: GET
        DeleteUser:
          Type: HttpApi
          Properties:
            ApiId: !Ref TribunetApi
            Path: /users/{id}
            Method: DELETE
        PutMe:
          Type: HttpApi
          Properties:
            ApiId: !Ref TribunetApi
            Path: /users/me
            Method: PUT

  # ── Lambda: Teams ─────────────────────────────────────────────────────────────
  TeamsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions.teams.handler.main
      Role: !GetAtt LambdaRole.Arn
      Events:
        GetTeams:
          Type: HttpApi
          Properties:
            ApiId: !Ref TribunetApi
            Path: /teams
            Method: GET
            Auth:
              Authorizer: NONE
        GetTeam:
          Type: HttpApi
          Properties:
            ApiId: !Ref TribunetApi
            Path: /teams/{id}
            Method: GET
            Auth:
              Authorizer: NONE
        CreateTeam:
          Type: HttpApi
          Properties:
            ApiId: !Ref TribunetApi
            Path: /teams
            Method: POST
        UpdateTeam:
          Type: HttpApi
          Properties:
            ApiId: !Ref TribunetApi
            Path: /teams/{id}
            Method: PUT
        DeleteTeam:
          Type: HttpApi
          Properties:
            ApiId: !Ref TribunetApi
            Path: /teams/{id}
            Method: DELETE

  # ── Lambda: Leagues ───────────────────────────────────────────────────────────
  LeaguesFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions.leagues.handler.main
      Role: !GetAtt LambdaRole.Arn
      Events:
        GetLeagues:
          Type: HttpApi
          Properties:
            ApiId: !Ref TribunetApi
            Path: /leagues
            Method: GET
            Auth:
              Authorizer: NONE
        GetLeague:
          Type: HttpApi
          Properties:
            ApiId: !Ref TribunetApi
            Path: /leagues/{id}
            Method: GET
            Auth:
              Authorizer: NONE
        CreateLeague:
          Type: HttpApi
          Properties:
            ApiId: !Ref TribunetApi
            Path: /leagues
            Method: POST
        UpdateLeague:
          Type: HttpApi
          Properties:
            ApiId: !Ref TribunetApi
            Path: /leagues/{id}
            Method: PUT
        DeleteLeague:
          Type: HttpApi
          Properties:
            ApiId: !Ref TribunetApi
            Path: /leagues/{id}
            Method: DELETE

  # ── Lambda: Scheduler (EventBridge weekly report) ────────────────────────────
  SchedulerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions.scheduler.handler.main
      Role: !GetAtt LambdaRole.Arn
      Environment:
        Variables:
          ALERTS_TOPIC_ARN: !Ref AlertsTopic
      Events:
        WeeklySchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 7 ? * SUN *)
            Description: Weekly match report every Sunday at 7:00 UTC (9:00 Israel time)
            Enabled: true

  # ── SNS Topic for CloudWatch Alarm notifications ─────────────────────────────
  AlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub 'tribunet-alerts-${Stage}'
      Subscription:
        - Protocol: email
          Endpoint: !Ref AlertEmail
        - Protocol: email
          Endpoint: !Ref AlertEmailSecondary

  # ── CloudWatch Alarms: MatchesFunction ────────────────────────────────────────
  MatchesFunctionErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'tribunet-${Stage}-matches-errors'
      AlarmDescription: MatchesFunction threw an unhandled exception
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref MatchesFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertsTopic

  MatchesFunctionThrottlesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'tribunet-${Stage}-matches-throttles'
      AlarmDescription: MatchesFunction is being throttled
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !Ref MatchesFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertsTopic

  # ── CloudWatch Alarms: StadiumsFunction ──────────────────────────────────────
  StadiumsFunctionErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'tribunet-${Stage}-stadiums-errors'
      AlarmDescription: StadiumsFunction threw an unhandled exception
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref StadiumsFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertsTopic

  StadiumsFunctionThrottlesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'tribunet-${Stage}-stadiums-throttles'
      AlarmDescription: StadiumsFunction is being throttled
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !Ref StadiumsFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertsTopic

  # ── CloudWatch Alarms: FavoritesFunction ─────────────────────────────────────
  FavoritesFunctionErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'tribunet-${Stage}-favorites-errors'
      AlarmDescription: FavoritesFunction threw an unhandled exception
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref FavoritesFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertsTopic

  FavoritesFunctionThrottlesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'tribunet-${Stage}-favorites-throttles'
      AlarmDescription: FavoritesFunction is being throttled
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !Ref FavoritesFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertsTopic

  # ── CloudWatch Alarms: UsersFunction ─────────────────────────────────────────
  UsersFunctionErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'tribunet-${Stage}-users-errors'
      AlarmDescription: UsersFunction threw an unhandled exception
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref UsersFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertsTopic

  UsersFunctionThrottlesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'tribunet-${Stage}-users-throttles'
      AlarmDescription: UsersFunction is being throttled
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !Ref UsersFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertsTopic

  # ── CloudWatch Alarms: CognitoTriggerFunction ─────────────────────────────────
  CognitoTriggerFunctionErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'tribunet-${Stage}-cognito-trigger-errors'
      AlarmDescription: CognitoTriggerFunction threw an unhandled exception
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref CognitoTriggerFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertsTopic

  CognitoTriggerFunctionThrottlesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'tribunet-${Stage}-cognito-trigger-throttles'
      AlarmDescription: CognitoTriggerFunction is being throttled
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !Ref CognitoTriggerFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertsTopic

# ── Outputs ───────────────────────────────────────────────────────────────────
Outputs:
  ApiUrl:
    Description: API Gateway endpoint — paste into frontend/.env as VITE_API_URL
    Value: !Sub 'https://${TribunetApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}'
    Export:
      Name: TribunetApiUrl

  MatchesTable:
    Description: DynamoDB Matches table name
    Value: !Ref MatchesTable

  StadiumsTable:
    Description: DynamoDB Stadiums table name
    Value: !Ref StadiumsTable
